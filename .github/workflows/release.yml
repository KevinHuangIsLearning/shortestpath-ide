name: Release ShortestPath IDE

on:
  push:
    tags:
      - 'Release-v*'
      - 'Beta-v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      VSCODE_ARCH: x64
      npm_config_arch: x64
      npm_config_foreground_scripts: "true"
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Locate Visual Studio C++ toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw 'No Visual Studio installation with the MSVC C++ build tools was found on this runner.'
          }
          "vs2022_install=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $sdkBin = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'
          $signTool = Get-ChildItem -Path $sdkBin -Filter signtool.exe -File -Recurse |
            Where-Object { $_.Directory.Name -eq 'x64' } |
            Sort-Object -Property FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) {
            throw "signtool.exe was not found under $sdkBin. Install the Windows 10/11 SDK."
          }
          $signTool.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $signTool.FullName /? | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "signtool.exe validation failed with exit code $LASTEXITCODE."
          }
      - name: Install dependencies
        shell: pwsh
        run: |
          . build/azure-pipelines/win32/exec.ps1
          $ErrorActionPreference = 'Stop'
          exec { npm ci }
          $nativeBindings = @(
            'node_modules\@vscode\policy-watcher\build\Release\vscode-policy-watcher.node',
            'node_modules\@vscode\spdlog\build\Release\spdlog.node',
            'node_modules\@vscode\sqlite3\build\Release\vscode-sqlite3.node',
            'node_modules\native-keymap\build\Release\keymapping.node'
          )
          if ($nativeBindings.Where({ -not (Test-Path -LiteralPath $_ -PathType Leaf) }).Count -gt 0) {
            exec { npm rebuild '@vscode/policy-watcher' '@vscode/spdlog' '@vscode/sqlite3' 'native-keymap' --foreground-scripts }
          }
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build Windows package
        shell: pwsh
        run: npm run gulp vscode-win32-x64-min
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Archive Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) 'VSCode-win32-x64'
          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE '.build\artifacts'
          $destination = Join-Path $artifactRoot 'VSCode-win32-x64'
          if (-not (Test-Path -LiteralPath $source -PathType Container)) {
            throw "Packaged application was not found at $source."
          }
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null
          Move-Item -LiteralPath $source -Destination $destination
          if (-not (Test-Path -LiteralPath (Join-Path $destination 'ShortestPath.exe') -PathType Leaf)) {
            throw "ShortestPath.exe was not found in the staged package at $destination."
          }
          $requiredExtensionEntries = @(
            'resources\app\extensions\divyanshuagrawal.competitive-programming-helper\dist\extension.js',
            'resources\app\extensions\shortestpath.setup\out\extension.js',
            'resources\app\extensions\danielpinto8zz6.c-cpp-compile-run\dist\extension.js',
            'resources\app\extensions\llvm-vs-code-extensions.vscode-clangd\out\bundle.js',
            'resources\app\extensions\tomoki1207.vscode-pdfviewer\out\src\extension.js'
          )
          foreach ($entry in $requiredExtensionEntries) {
            $entryPath = Join-Path $destination $entry
            if (-not (Test-Path -LiteralPath $entryPath -PathType Leaf)) {
              throw "Required extension entry file was not packaged: $entry"
            }
          }
          Compress-Archive -Path "$destination\*" -DestinationPath ShortestPath-IDE-windows-x64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: ShortestPath-IDE-windows-x64.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS ARM64
    runs-on: macos-14
    timeout-minutes: 90
    env:
      VSCODE_ARCH: arm64
      npm_config_arch: arm64
      npm_config_foreground_scripts: "true"
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: |
          npm ci
          missing=0
          for binding in \
            node_modules/@vscode/policy-watcher/build/Release/vscode-policy-watcher.node \
            node_modules/@vscode/spdlog/build/Release/spdlog.node \
            node_modules/@vscode/sqlite3/build/Release/vscode-sqlite3.node \
            node_modules/native-keymap/build/Release/keymapping.node; do
            test -f "$binding" || missing=1
          done
          if [ "$missing" -eq 1 ]; then
            npm rebuild @vscode/policy-watcher @vscode/spdlog @vscode/sqlite3 native-keymap --foreground-scripts
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build macOS package
        run: npm run gulp vscode-darwin-arm64-min
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Archive macOS application
        run: |
          app="../VSCode-darwin-arm64/ShortestPath IDE.app"
          for entry in \
            "divyanshuagrawal.competitive-programming-helper/dist/extension.js" \
            "shortestpath.setup/out/extension.js" \
            "danielpinto8zz6.c-cpp-compile-run/dist/extension.js" \
            "llvm-vs-code-extensions.vscode-clangd/out/bundle.js" \
            "tomoki1207.vscode-pdfviewer/out/src/extension.js"; do
            test -f "$app/Contents/Resources/app/extensions/$entry" || {
              echo "Required extension entry file was not packaged: $entry" >&2
              exit 1
            }
          done
          mkdir artifacts
          ditto -c -k --sequesterRsrc --keepParent "$app" artifacts/ShortestPath-IDE-macos-arm64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: artifacts/ShortestPath-IDE-macos-arm64.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      # `gh release create` derives the repository from the local Git checkout.
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" == Beta-v* ]]; then
            title="ShortestPath IDE Beta v${tag#Beta-v}"
            notes="Beta release — preview build for testing."
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" release/* --clobber
              gh release edit "$tag" --prerelease --title "$title" --notes "$notes"
            else
              gh release create "$tag" release/* --prerelease --title "$title" --notes "$notes"
            fi
          else
            title="ShortestPath IDE Release v${tag#Release-v}"
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" release/* --clobber
              gh release edit "$tag" --title "$title"
            else
              gh release create "$tag" release/* --generate-notes --title "$title"
            fi
          fi

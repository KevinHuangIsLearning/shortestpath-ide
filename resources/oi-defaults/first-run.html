<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
	<title>ShortestPath IDE</title>
	<style>
		:root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
		* { box-sizing: border-box; }
		body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 20% 0%, #25345f 0, transparent 38%), #0f1117; color: #f4f6fb; }
		main { width: min(960px, calc(100vw - 80px)); }
		.badge { color: #a8c7ff; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
		h1 { font-size: clamp(42px, 6vw, 72px); margin: 14px 0; letter-spacing: -.04em; }
		.lead { font-size: 20px; line-height: 1.6; color: #b7bfce; max-width: 680px; }
		.cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; margin: 44px 0 26px; }
		button { appearance: none; font: inherit; color: inherit; cursor: pointer; }
		.card { text-align: left; min-height: 200px; padding: 28px; border: 1px solid #30394d; border-radius: 18px; background: #171b25; transition: .16s ease; }
		.card:hover, .card.selected { border-color: #78a9ff; background: #1b2540; transform: translateY(-2px); }
		.card strong { display: block; font-size: 25px; margin-bottom: 12px; }
		.card span { color: #b7bfce; line-height: 1.55; }
		.options { display: none; padding: 22px 0 8px; color: #d9e2f2; }
		.options.visible { display: grid; gap: 14px; }
		.source-choice { margin-top: 8px; color: #d9e2f2; }
		select { margin-left: 10px; padding: 8px 10px; border: 1px solid #30394d; border-radius: 8px; background: #171b25; color: #f4f6fb; font: inherit; }
		label { display: flex; gap: 12px; align-items: center; font-size: 16px; }
		input[type="checkbox"] { width: 18px; height: 18px; accent-color: #78a9ff; }
		input[type="number"] { width: 86px; padding: 8px 10px; border: 1px solid #30394d; border-radius: 8px; background: #171b25; color: #f4f6fb; font: inherit; }
		.actions { display: flex; justify-content: space-between; align-items: center; margin-top: 34px; }
		.primary { padding: 13px 24px; border: 0; border-radius: 9px; background: #78a9ff; color: #071329; font-weight: 700; }
		.skip { border: 0; background: transparent; color: #aeb8c9; }
		.note { color: #8d98aa; font-size: 14px; }
		[hidden] { display: none !important; }
		.progress { margin-top: 34px; padding: 20px; height: 230px; overflow: auto; border: 1px solid #30394d; border-radius: 12px; background: #0b0d12; color: #b7c8e8; font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
		.status { color: #a8c7ff; font-size: 18px; }
		.drag-region { position: fixed; inset: 0 0 auto; height: 32px; -webkit-app-region: drag; }
	</style>
</head>
<body>
	<div class="drag-region" aria-hidden="true"></div>
	<main>
		<section id="choice-page">
		<div class="badge">ShortestPath IDE</div>
		<h1 id="choice-title">准备好开始竞赛编程。</h1>
		<p id="choice-lead" class="lead">先选择一套环境方案。我们会探测编译器、按你的系统提供安装步骤，并把设置写入你的个人配置。完成后才会打开 IDE。</p>
		<section class="cards">
			<button class="card selected" data-mode="recommended"><strong id="recommended-label">Recommended</strong><span id="recommended-description">配置 C++ 竞赛环境、编辑体验、CPH 与常用 OJ 映射。缺少 g++ 或 clangd 时提供对应系统的安装步骤。</span></button>
			<button class="card" data-mode="custom"><strong id="custom-label">Custom</strong><span id="custom-description">自行决定是否应用编辑器预设、CPH/OJ 映射和自动下载编译器。</span></button>
		</section>
		<div id="source-choice" class="source-choice" hidden><label><span id="source-label">下载源</span><select id="download-source"></select></label></div>
		<div class="actions">
			<button id="skip" class="skip">稍后配置</button>
			<div><span id="permission-note" class="note">安装需要确认，可能要求管理员权限。</span> <button id="continue" class="primary">继续</button></div>
		</div>
		</section>
		<section id="download-page" hidden>
			<div class="badge">Toolchain</div>
			<h1 id="download-title">正在准备编译环境。</h1>
			<p id="download-status" class="status">正在连接下载源…</p>
			<div id="progress" class="progress"></div>
			<div class="actions"><span class="note">请保持此窗口打开。下载完成后可继续配置。</span><span><button id="retry" class="primary" hidden>重试</button><button id="download-next" class="primary" hidden>下一步</button></span></div>
		</section>
		<section id="configure-page" hidden>
			<div class="badge">Configuration</div>
			<h1 id="configuration-title">工具链已准备就绪。</h1>
			<p id="configuration-lead" class="lead">确认要写入的 ShortestPath IDE 配置，然后进入工作台。</p>
			<div id="final-options" class="options visible"></div>
			<div class="actions"><span class="note">设置写入个人配置，不影响其他编辑器。</span><button id="finish" class="primary">应用配置并打开 IDE</button></div>
		</section>
	</main>
	<script>
	(async () => {
		const ideLocale = await window.shortestPathSetup.getLocale();
		const language = String(ideLocale ?? navigator.language).toLowerCase().startsWith('zh') ? 'zh-CN' : 'en';
		const script = await window.shortestPathSetup.getScript();
		const localize = value => typeof value === 'string' ? value : value[language] ?? value.en ?? value['zh-CN'];
		const pages = script.pages;
		const sources = Array.isArray(script.downloadSources) ? script.downloadSources : [];
		const translations = {
			'en': {
				choiceTitle: 'Ready for competitive programming.', choiceLead: 'Choose an environment setup. We will detect compilers, provide system-specific installation steps, and save your preferences before opening the IDE.',
				recommended: 'Configure the C++ toolchain, editor experience, CPH, and common online-judge mappings.', custom: 'Choose the editor, CPH, and toolchain options yourself.',
				permission: 'Installation may require confirmation or administrator permission.', skip: 'Configure later', continue: 'Continue', downloadTitle: 'Preparing your toolchain.', configurationTitle: 'Your toolchain is ready.', configurationLead: 'Confirm the ShortestPath IDE preferences to save before opening the workbench.'
			},
			'zh-CN': {
				choiceTitle: '准备好开始竞赛编程。', choiceLead: '先选择一套环境方案。我们会探测编译器、按你的系统提供安装步骤，并把设置写入你的个人配置。完成后才会打开 IDE。',
				recommended: '配置 C++ 竞赛环境、编辑体验、CPH 与常用 OJ 映射。缺少 g++ 或 clangd 时提供对应系统的安装步骤。', custom: '自行决定是否应用编辑器预设、CPH/OJ 映射和自动下载编译器。',
				permission: '安装需要确认，可能要求管理员权限。', skip: '稍后配置', continue: '继续', downloadTitle: '正在准备编译环境。', configurationTitle: '工具链已准备就绪。', configurationLead: '确认要写入的 ShortestPath IDE 配置，然后进入工作台。'
			}
		};
		const t = translations[language];
		document.documentElement.lang = language;
		document.getElementById('choice-title').textContent = t.choiceTitle;
		document.getElementById('choice-lead').textContent = t.choiceLead;
		document.getElementById('recommended-description').textContent = t.recommended;
		document.getElementById('custom-description').textContent = t.custom;
		document.getElementById('permission-note').textContent = t.permission;
		document.getElementById('skip').textContent = t.skip;
		document.getElementById('continue').textContent = t.continue;
		document.getElementById('download-title').textContent = t.downloadTitle;
		document.getElementById('configuration-title').textContent = t.configurationTitle;
		document.getElementById('configuration-lead').textContent = t.configurationLead;
		document.getElementById('choice-title').textContent = localize(pages[0].title);
		document.getElementById('choice-lead').textContent = localize(pages[0].text);
		document.getElementById('recommended-description').textContent = localize(pages[0].selections.Recommended.description);
		document.getElementById('custom-description').textContent = localize(pages[0].selections.Custom.description);
		document.getElementById('recommended-label').textContent = localize(pages[0].selections.Recommended.label);
		document.getElementById('custom-label').textContent = localize(pages[0].selections.Custom.label);
		const pageById = id => pages.find(page => page.id === id);
		const toolchainPage = pageById('toolchain') ?? pages.find(page => page.controls === undefined && page !== pages[0]);
		const xcodePage = pageById('xcode');
		const homebrewPage = pageById('homebrew');
		const configurationPage = pageById('configuration') ?? pages.find(page => Array.isArray(page.controls));
		document.getElementById('download-title').textContent = localize(toolchainPage.title);
		document.getElementById('download-status').textContent = localize(toolchainPage.text);
		document.getElementById('configuration-title').textContent = localize(configurationPage.title);
		document.getElementById('configuration-lead').textContent = localize(configurationPage.text);
		const sourceChoice = document.getElementById('source-choice');
		const sourceSelect = document.getElementById('download-source');
		if (sources.length) {
			document.getElementById('source-label').textContent = localize(script.downloadSourceLabel);
			sourceSelect.innerHTML = sources.map(source => `<option value="${source.id}" ${source.unavailable ? 'disabled' : ''}>${localize(source.label)}</option>`).join('');
			const chineseSource = sources.find(source => source.id === 'tuna');
			if (language === 'zh-CN' && chineseSource) sourceSelect.value = chineseSource.id;
			sourceChoice.hidden = false;
		}
		let mode = 'recommended';
		let toolchainReady = false;
		let pendingCustomRequest;
		const cards = document.querySelectorAll('[data-mode]');
		cards.forEach(card => card.addEventListener('click', () => {
			mode = card.dataset.mode;
			cards.forEach(item => item.classList.toggle('selected', item === card));
			sourceChoice.hidden = mode !== 'recommended' || sources.length === 0;
		}));
		const choicePage = document.getElementById('choice-page');
		const downloadPage = document.getElementById('download-page');
		const configurePage = document.getElementById('configure-page');
		const progress = document.getElementById('progress');
		const status = document.getElementById('download-status');
		const request = () => ({
			mode,
			editor: mode === 'recommended' || (document.getElementById('editor')?.checked ?? true),
			cph: mode === 'recommended' || (document.getElementById('cph')?.checked ?? true),
			installToolchain: mode === 'recommended' || (document.getElementById('installToolchain')?.checked ?? true),
			fontLigatures: document.getElementById('fontLigatures')?.checked ?? true,
			fontSize: Math.min(32, Math.max(10, Number(document.getElementById('fontSize')?.value ?? 14) || 14)),
			vjudgeOpenInBrowser: document.getElementById('vjudgeOpenInBrowser')?.checked ?? true
		});
		const showConfiguration = () => {
			choicePage.hidden = true;
			downloadPage.hidden = true;
			configurePage.hidden = false;
			const target = document.getElementById('final-options');
			const controls = mode === 'recommended'
				? configurationPage.controls.filter(control => !['editor', 'cph', 'installToolchain'].includes(control.key))
				: configurationPage.controls;
			target.innerHTML = controls.map(control => control.type === 'number'
				? `<label>${localize(control.label)} <input id="${control.key}" type="number" min="${control.min}" max="${control.max}" value="${control.default}"></label>`
				: `<label><input id="${control.key}" type="checkbox" ${control.default ? 'checked' : ''}>${localize(control.label)}</label>`).join('');
		};
		let downloadStage = 'toolchain';
		const download = async (stage = 'toolchain') => {
			downloadStage = stage;
			const page = stage === 'xcode' ? xcodePage : stage === 'homebrew' ? homebrewPage : toolchainPage;
			choicePage.hidden = true;
			downloadPage.hidden = false;
			progress.textContent = '';
			document.getElementById('download-title').textContent = localize(page.title);
			status.textContent = localize(page.text);
			document.getElementById('retry').hidden = true;
			document.getElementById('download-next').hidden = true;
			const result = await window.shortestPathSetup.installToolchain(sourceSelect.value || undefined, stage);
			if (result.success) {
				toolchainReady = true;
				status.textContent = '下载完成。点击“下一步”继续配置。';
				document.getElementById('download-next').hidden = false;
			} else {
				status.textContent = `下载失败：${result.message}`;
				document.getElementById('retry').hidden = false;
			}
		};
		window.shortestPathSetup.onProgress(message => { progress.textContent += `${message}\n`; progress.scrollTop = progress.scrollHeight; });
		document.getElementById('continue').addEventListener('click', () => mode === 'recommended' ? download(xcodePage ? 'xcode' : homebrewPage ? 'homebrew' : 'toolchain') : showConfiguration());
		document.getElementById('retry').addEventListener('click', () => download(downloadStage));
		document.getElementById('download-next').addEventListener('click', () => {
			if (downloadStage === 'xcode') {
				download('homebrew');
			} else if (downloadStage === 'homebrew') {
				download('toolchain');
			} else if (pendingCustomRequest) {
				window.shortestPathSetup.complete({ ...pendingCustomRequest, installToolchain: true });
			} else {
				showConfiguration();
			}
		});
		document.getElementById('finish').addEventListener('click', () => {
			const selectedRequest = request();
			if (mode === 'custom' && selectedRequest.installToolchain && !toolchainReady) {
				pendingCustomRequest = selectedRequest;
				download(xcodePage ? 'xcode' : homebrewPage ? 'homebrew' : 'toolchain');
				return;
			}
			window.shortestPathSetup.complete({ ...selectedRequest, installToolchain: toolchainReady });
		});
		document.getElementById('skip').addEventListener('click', () => window.shortestPathSetup.complete(undefined));
	})();
	</script>
</body>
</html>
